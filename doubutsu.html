<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>どうぶつがっこう ― さんすう・こくご</title>
<style>
  :root {
    --bg: #fff7e6;
    --ink: #5a4a35;
    --dim: #9a8b72;
    --blue: #52b6e8;
    --blue-d: #2e8fc4;
    --pink: #f47ea0;
    --pink-d: #d8567f;
    --green: #7bc86a;
    --green-d: #57a848;
    --yellow: #ffcf4a;
    --card: #fffdf7;
    --shadow: rgba(150, 120, 70, 0.22);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg); color: var(--ink);
    font-family: "Hiragino Maru Gothic ProN", "Hiragino Kaku Gothic ProN", "Noto Sans JP", "Yu Gothic", system-ui, sans-serif;
    -webkit-user-select: none; user-select: none; touch-action: manipulation; }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  #app { position: relative; width: 100%; height: 100%; max-width: 560px; margin: 0 auto; }
  #confetti { position: absolute; inset: 0; z-index: 40; pointer-events: none; }

  .screen { position: absolute; inset: 0; display: flex; flex-direction: column; opacity: 0; pointer-events: none; transition: opacity .25s; }
  .screen.on { opacity: 1; pointer-events: auto; }

  /* ---------- top bar ---------- */
  .topbar { display: flex; align-items: center; gap: 8px; padding: 12px 14px; }
  .back { font-size: 15px; font-weight: 800; color: var(--ink); background: var(--card); border-radius: 999px; padding: 8px 16px; box-shadow: 0 3px 8px var(--shadow); }
  .back:active { transform: scale(0.94); }
  .spacer { flex: 1; }
  .chip { font-size: 15px; font-weight: 800; background: var(--card); border-radius: 999px; padding: 8px 14px; box-shadow: 0 3px 8px var(--shadow); }
  .chip.star b { color: #f0a800; } .chip.paw b { color: var(--green-d); }

  /* ---------- home ---------- */
  #home { align-items: center; justify-content: center; text-align: center; gap: 4px; padding: 20px; }
  #home .hometop { position: absolute; top: 12px; left: 0; right: 0; display: flex; gap: 8px; padding: 0 14px; }
  #mascot { font-size: 74px; line-height: 1; animation: bob 1.6s ease-in-out infinite; }
  @keyframes bob { 50% { transform: translateY(-10px) rotate(-3deg); } }
  #home h1 { font-size: clamp(28px, 8vw, 40px); font-weight: 900; letter-spacing: 0.06em; color: var(--ink); margin-top: 6px; }
  #home h1 .a { color: var(--blue-d); } #home h1 .b { color: var(--pink-d); }
  #home .lead { font-size: 14px; color: var(--dim); margin-top: 6px; margin-bottom: 18px; }
  .bigbtn { width: min(360px, 86vw); padding: 20px; border-radius: 24px; font-size: 24px; font-weight: 900; letter-spacing: 0.06em;
    color: #fff; box-shadow: 0 7px 0 var(--sd), 0 10px 18px var(--shadow); display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 16px; transition: transform .08s; }
  .bigbtn:active { transform: translateY(5px); box-shadow: 0 2px 0 var(--sd), 0 4px 10px var(--shadow); }
  .bigbtn .em { font-size: 34px; }
  .bigbtn.sansuu { background: var(--blue); --sd: var(--blue-d); }
  .bigbtn.kokugo { background: var(--pink); --sd: var(--pink-d); }
  .bigbtn.dex { background: var(--green); --sd: var(--green-d); font-size: 20px; padding: 16px; }
  .bigbtn .sub { font-size: 12px; font-weight: 700; opacity: 0.9; }

  /* ---------- quiz ---------- */
  #quiz .progress { flex: 1; height: 16px; background: rgba(0,0,0,0.08); border-radius: 999px; overflow: hidden; margin: 0 4px; }
  #quiz .progress .fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--yellow), #ffb04a); border-radius: 999px; transition: width .4s; }
  #quiz-body { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 8px 18px 18px; gap: 12px; overflow: hidden; }
  #quiz-animal { font-size: 66px; line-height: 1; transition: transform .2s; }
  #quiz-animal.happy { animation: happy .6s ease; } @keyframes happy { 0%,100%{transform:translateY(0)} 30%{transform:translateY(-22px) scale(1.1)} 60%{transform:translateY(0) scale(1)} }
  #quiz-animal.sad { animation: sad .4s ease; } @keyframes sad { 25%{transform:translateX(-8px) rotate(-4deg)} 75%{transform:translateX(8px) rotate(4deg)} }
  #speech { min-height: 22px; font-size: 15px; font-weight: 800; color: var(--pink-d); }
  #qcard { width: 100%; max-width: 460px; background: var(--card); border-radius: 24px; box-shadow: 0 6px 16px var(--shadow); padding: 22px 18px; text-align: center; }
  #qcard .qsub { font-size: 13px; color: var(--dim); font-weight: 700; margin-bottom: 8px; }
  #qcard .qmain { font-size: clamp(30px, 9vw, 44px); font-weight: 900; letter-spacing: 0.04em; line-height: 1.3; color: var(--ink); }
  #qcard .qstory { font-size: 17px; font-weight: 800; line-height: 1.7; color: var(--ink); }
  #answers { width: 100%; max-width: 460px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  #answers.three { grid-template-columns: repeat(3, 1fr); }
  #answers.one { grid-template-columns: 1fr; }
  .ans { padding: 20px 8px; border-radius: 20px; font-size: 30px; font-weight: 900; color: var(--ink);
    background: var(--card); box-shadow: 0 5px 0 rgba(150,120,70,0.25), 0 7px 14px var(--shadow); transition: transform .08s; min-height: 72px; }
  .ans:active { transform: translateY(4px); box-shadow: 0 1px 0 rgba(150,120,70,0.25); }
  .ans.correct { background: #c7efb8; box-shadow: 0 5px 0 var(--green-d); color: var(--green-d); animation: pop .4s; }
  .ans.wrong { background: #ffd9c2; box-shadow: 0 5px 0 #e08a5a; }
  @keyframes pop { 50% { transform: scale(1.08); } }
  .ans .em { font-size: 34px; }
  #feedback { position: absolute; top: 0; left: 0; right: 0; bottom: 0; display: none; align-items: center; justify-content: center; z-index: 15; pointer-events: none; }
  #feedback.on { display: flex; }
  #feedback .big { font-size: clamp(44px, 14vw, 72px); font-weight: 900; animation: fbpop .5s cubic-bezier(.2,1.4,.4,1); text-shadow: 0 4px 0 rgba(0,0,0,0.1); }
  @keyframes fbpop { from { transform: scale(0.4) rotate(-8deg); opacity: 0; } to { transform: scale(1) rotate(-4deg); opacity: 1; } }

  /* ---------- dex ---------- */
  #dex .grid { flex: 1; overflow-y: auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(88px, 1fr)); gap: 10px; padding: 6px 14px 24px; align-content: start; }
  .acell { background: var(--card); border-radius: 18px; box-shadow: 0 3px 9px var(--shadow); padding: 10px 4px 8px; text-align: center; transition: transform .1s; }
  .acell:active { transform: scale(0.94); }
  .acell .em { font-size: 40px; line-height: 1.1; }
  .acell .nm { font-size: 12px; font-weight: 800; margin-top: 2px; }
  .acell.locked { opacity: 0.55; }
  .acell.locked .em { filter: grayscale(1) brightness(1.4) contrast(0.4); }
  .acell.locked .nm { color: var(--dim); }

  /* ---------- modals ---------- */
  .modal { position: absolute; inset: 0; z-index: 30; display: none; align-items: center; justify-content: center; padding: 22px;
    background: rgba(70,55,35,0.5); backdrop-filter: blur(3px); -webkit-backdrop-filter: blur(3px); }
  .modal.on { display: flex; }
  .modal .card { background: var(--card); border-radius: 26px; box-shadow: 0 16px 44px rgba(80,55,20,0.4); width: min(400px, 92vw); padding: 22px; text-align: center; animation: cardpop .4s cubic-bezier(.2,1.3,.4,1); }
  @keyframes cardpop { from { transform: scale(0.7); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .modal .em { font-size: 84px; line-height: 1; animation: bob 1.6s ease-in-out infinite; }
  .modal .nm { font-size: 26px; font-weight: 900; margin-top: 4px; }
  .modal .newtag { display: inline-block; font-size: 12px; font-weight: 900; color: #fff; background: var(--pink); border-radius: 999px; padding: 4px 14px; margin-bottom: 6px; letter-spacing: 0.1em; }
  .fact { display: flex; align-items: flex-start; gap: 10px; text-align: left; background: var(--bg); border-radius: 16px; padding: 12px 14px; margin-top: 10px; }
  .fact .fi { font-size: 22px; } .fact .ft { flex: 1; } .fact .fl { font-size: 12px; font-weight: 800; color: var(--dim); } .fact .fv { font-size: 15px; font-weight: 700; line-height: 1.5; }
  .modal .mbtn { margin-top: 16px; width: 100%; padding: 15px; border-radius: 18px; font-size: 18px; font-weight: 900; color: #fff; background: var(--green); box-shadow: 0 5px 0 var(--green-d); }
  .modal .mbtn:active { transform: translateY(4px); box-shadow: 0 1px 0 var(--green-d); }
  .modal .mbtn.close { background: var(--blue); box-shadow: 0 5px 0 var(--blue-d); }

  /* ---------- sound toggle ---------- */
  #snd { font-size: 20px; background: var(--card); border-radius: 999px; width: 40px; height: 40px; box-shadow: 0 3px 8px var(--shadow); }
</style>
</head>
<body>
<div id="app">
  <canvas id="confetti"></canvas>
  <!-- HOME -->
  <section class="screen on" id="home">
    <div class="hometop"><span class="chip star">⭐ <b id="h-star">0</b></span><span class="chip paw">🐾 <b id="h-paw">0</b></span><div class="spacer"></div><button id="snd">🔊</button></div>
    <div id="mascot">🦊</div>
    <h1><span class="a">さんすう</span>・<span class="b">こくご</span></h1>
    <div class="lead">こたえると どうぶつと なかよく なれるよ！</div>
    <button class="bigbtn sansuu" data-act="sansuu"><span class="em">🔢</span><div>さんすう<div class="sub">たしざん・ひきざん</div></div></button>
    <button class="bigbtn kokugo" data-act="kokugo"><span class="em">🈁</span><div>こくご<div class="sub">ことば・ひらがな</div></div></button>
    <button class="bigbtn dex" data-act="dex"><span class="em">📖</span>どうぶつずかん</button>
  </section>

  <!-- QUIZ -->
  <section class="screen" id="quiz">
    <div class="topbar">
      <button class="back" data-act="home">◀ もどる</button>
      <div class="progress"><div class="fill" id="q-fill"></div></div>
      <span class="chip star">⭐ <b id="q-star">0</b></span>
    </div>
    <div id="quiz-body">
      <div id="quiz-animal">🐰</div>
      <div id="speech"></div>
      <div id="qcard"><div class="qsub" id="q-sub"></div><div id="q-content"></div></div>
      <div id="answers"></div>
    </div>
    <div id="feedback"><div class="big" id="fb-big"></div></div>
  </section>

  <!-- DEX -->
  <section class="screen" id="dex">
    <div class="topbar"><button class="back" data-act="home">◀ もどる</button><span class="chip">📖 どうぶつずかん</span><div class="spacer"></div><span class="chip paw"><b id="d-paw">0</b>/<b id="d-total">0</b></span></div>
    <div class="grid" id="dex-grid"></div>
  </section>

  <!-- new-animal reveal -->
  <div class="modal" id="reveal"><div class="card">
    <div class="newtag">はじめまして！</div>
    <div class="em" id="rv-em">🐘</div>
    <div class="nm" id="rv-nm"></div>
    <div class="fact"><span class="fi">🍽</span><div class="ft"><div class="fl">たべもの</div><div class="fv" id="rv-food"></div></div></div>
    <div class="fact"><span class="fi">✨</span><div class="ft"><div class="fl">とくちょう</div><div class="fv" id="rv-char"></div></div></div>
    <button class="mbtn" id="rv-ok">やった！ つづける</button>
  </div></div>

  <!-- animal detail -->
  <div class="modal" id="detail"><div class="card">
    <div class="em" id="dt-em">🐘</div>
    <div class="nm" id="dt-nm"></div>
    <div class="fact"><span class="fi">🍽</span><div class="ft"><div class="fl">たべもの</div><div class="fv" id="dt-food"></div></div></div>
    <div class="fact"><span class="fi">✨</span><div class="ft"><div class="fl">とくちょう</div><div class="fv" id="dt-char"></div></div></div>
    <div class="fact"><span class="fi">🔊</span><div class="ft"><div class="fl">なきごえ・ひとこと</div><div class="fv" id="dt-extra"></div></div></div>
    <button class="mbtn close" id="dt-close">とじる</button>
  </div></div>
</div>
<script>
"use strict";
(() => {
  // ============================================================
  //  どうぶつがっこう ― learn さんすう・こくご, meet animals
  // ============================================================
  const $ = id => document.getElementById(id);
  const ri = n => (Math.random() * n) | 0;
  const pick = a => a[ri(a.length)];
  const shuffle = a => { for (let i = a.length - 1; i > 0; i--) { const j = ri(i + 1); [a[i], a[j]] = [a[j], a[i]]; } return a; };

  // ============================================================
  //  ANIMALS — food & characteristics (all simple hiragana)
  // ============================================================
  const ANIMALS = [
    { id: "usagi", em: "🐰", nm: "うさぎ", food: "にんじん・くさ・はっぱ", char: "みみが ながくて、おとが よく きこえるよ。ぴょんぴょん はねるのが とくい。", extra: "ながい みみが トレードマーク！" },
    { id: "zou", em: "🐘", nm: "ぞう", food: "くさ・きのは・くだもの", char: "りくで いちばん おおきい どうぶつ。ながい はなで みずを のむよ。", extra: "「パオーン」と なくよ。" },
    { id: "lion", em: "🦁", nm: "ライオン", food: "しまうまなどの にく", char: "「ひゃくじゅうの おう」と よばれる。オスは たてがみが あるよ。", extra: "「ガオー」！ ネコの なかま。" },
    { id: "panda", em: "🐼", nm: "パンダ", food: "たけ・ささ", char: "しろと くろの もよう。1にちの おおくを たべて すごすよ。", extra: "ささが だいすき。" },
    { id: "kirin", em: "🦒", nm: "きりん", food: "たかい きの はっぱ", char: "くびが とても ながくて、せが たかいよ。たかい はっぱも たべられる。", extra: "せかいで いちばん せが たかい どうぶつ。" },
    { id: "penguin", em: "🐧", nm: "ペンギン", food: "さかな", char: "とりだけど そらは とべない。そのかわり およぐのが とくい！", extra: "さむい ところに すんでいるよ。" },
    { id: "saru", em: "🐵", nm: "さる", food: "くだもの・きのみ", char: "きのぼりが じょうず。てを つかって どうぐも つかえるよ。", extra: "ひとに ちかい なかま。" },
    { id: "kuma", em: "🐻", nm: "くま", food: "さかな・きのみ・はちみつ", char: "ちからもち。ふゆは あなの なかで ふゆごもり(ねむる)するよ。", extra: "はちみつが だいすき。" },
    { id: "kaeru", em: "🐸", nm: "かえる", food: "むし", char: "みずと りくの りょうほうで くらせる。ジャンプが とくい。", extra: "「ケロケロ」と なくよ。" },
    { id: "kame", em: "🐢", nm: "かめ", food: "くさ・むし・さかな", char: "かたい こうらで みを まもる。ゆっくり あるくよ。", extra: "とても ながいき する どうぶつ。" },
    { id: "tako", em: "🐙", nm: "たこ", food: "かに・えび・かい", char: "あしが 8ほん ある。いろを かえて かくれるのが じょうず。", extra: "うみに すんでいるよ。" },
    { id: "iruka", em: "🐬", nm: "いるか", food: "さかな・いか", char: "とても かしこい。おとを つかって なかまと おはなしするよ。", extra: "うみの にんきもの。" },
    { id: "fukurou", em: "🦉", nm: "ふくろう", food: "ねずみ・むし", char: "よるに かつどうする とり。くびが ぐるっと よく まわるよ。", extra: "「ホーホー」と なくよ。" },
    { id: "kitsune", em: "🦊", nm: "きつね", food: "ねずみ・とり・きのみ", char: "しっぽが ふさふさ。あたまが よくて すばやいよ。", extra: "がっこうの マスコット！" },
    { id: "buta", em: "🐷", nm: "ぶた", food: "やさい・きのみ・なんでも", char: "はなが よく きく。じつは とても きれいずきなんだ。", extra: "「ブヒブヒ」。" },
    { id: "hebi", em: "🐍", nm: "へび", food: "ねずみ・たまご", char: "あしが ないのに するする すすむ。したで においを かぐよ。", extra: "ながい からだ。" },
    { id: "koala", em: "🐨", nm: "コアラ", food: "ユーカリの はっぱ", char: "1にちの ほとんどを ねて すごす。きに つかまっているよ。", extra: "とっても ねむがりや。" },
    { id: "risu", em: "🐿️", nm: "りす", food: "どんぐり・きのみ", char: "ほっぺに たべものを ためられる。ふゆに そなえて かくすよ。", extra: "しっぽが おおきくて ふわふわ。" },
    { id: "hitsuji", em: "🐑", nm: "ひつじ", food: "くさ", char: "ふわふわの けが はえる。その けから セーターが つくれるよ。", extra: "「メエー」と なくよ。" },
    { id: "niwatori", em: "🐔", nm: "にわとり", food: "こくもつ・むし", char: "たまごを うむ とり。あさ「コケコッコー」と なくよ。", extra: "たまごを ありがとう！" },
  ];
  const ANIMAL_BY_ID = {}; ANIMALS.forEach(a => ANIMAL_BY_ID[a.id] = a);

  // ============================================================
  //  QUESTION GENERATORS
  //  returns { sub, cardHTML, choices:[{t,em?}], correct, cols }
  // ============================================================
  function numChoices(correct, spread, count) {
    const set = new Set([correct]);
    let guard = 0;
    while (set.size < count && guard++ < 50) { const d = correct + (ri(spread * 2 + 1) - spread); if (d >= 0) set.add(d); }
    while (set.size < count) set.add(set.size); // fallback
    const arr = shuffle([...set]).slice(0, count);
    if (!arr.includes(correct)) arr[0] = correct;
    return { choices: arr.map(n => ({ t: String(n) })), correct: arr.indexOf(correct) };
  }

  // ---- さんすう ----
  let mathLv = 0; // grows slowly, stays gentle
  const COUNTERS = [["🍎", "こ"], ["🍌", "ほん"], ["🍬", "こ"], ["⭐", "こ"], ["🌰", "こ"]];
  function genSansuu() {
    const maxAdd = 5 + Math.min(mathLv, 8);            // 5..13
    const kind = pick(["add", "add", "sub", "sub", "story"]);
    if (kind === "story") {
      const an = pick(ANIMALS), [em, ctr] = pick(COUNTERS);
      const a = 1 + ri(4), b = 1 + ri(4);
      const plus = Math.random() < 0.6;
      const correct = plus ? a + b : Math.max(a, b) - Math.min(a, b);
      const big = Math.max(a, b), sml = Math.min(a, b);
      const html = plus
        ? `<div class="qstory">${an.em} ${an.nm}さんが ${em}を ${a}${ctr} もっています。<br>${b}${ctr} もらうと、ぜんぶで なん${ctr}？</div>`
        : `<div class="qstory">${an.em} ${an.nm}さんは ${em}を ${big}${ctr} もっています。<br>${sml}${ctr} たべると、のこりは なん${ctr}？</div>`;
      const nc = numChoices(correct, 3, 3);
      return { sub: "さんすう ・ おはなし", cardHTML: html, choices: nc.choices, correct: nc.correct, cols: 3, animal: an.em };
    }
    if (kind === "sub") {
      const a = 2 + ri(maxAdd), b = ri(a + 1), c = a - b;
      const nc = numChoices(c, 3, 3);
      return { sub: "さんすう ・ ひきざん", cardHTML: `<div class="qmain">${a} − ${b} = ?</div>`, choices: nc.choices, correct: nc.correct, cols: 3 };
    }
    const a = ri(maxAdd + 1), b = ri(maxAdd + 1), c = a + b;
    const nc = numChoices(c, 3, 3);
    return { sub: "さんすう ・ たしざん", cardHTML: `<div class="qmain">${a} ＋ ${b} = ?</div>`, choices: nc.choices, correct: nc.correct, cols: 3 };
  }

  // ---- こくご ----
  const KWORDS = [
    { w: "ぞう", e: "🐘" }, { w: "ねこ", e: "🐱" }, { w: "いぬ", e: "🐶" }, { w: "うさぎ", e: "🐰" }, { w: "きりん", e: "🦒" },
    { w: "りんご", e: "🍎" }, { w: "ばなな", e: "🍌" }, { w: "すいか", e: "🍉" }, { w: "いちご", e: "🍓" }, { w: "みかん", e: "🍊" },
    { w: "でんしゃ", e: "🚃" }, { w: "くるま", e: "🚗" }, { w: "ひこうき", e: "✈️" }, { w: "ふね", e: "⛵" },
    { w: "はな", e: "🌸" }, { w: "つき", e: "🌙" }, { w: "ほし", e: "⭐" }, { w: "かさ", e: "☂️" }, { w: "とけい", e: "⏰" }, { w: "ぼうし", e: "🧢" },
  ];
  const OPP = [["おおきい","ちいさい"],["たかい","ひくい"],["ながい","みじかい"],["あつい","さむい"],["はやい","おそい"],["おおい","すくない"],["うえ","した"],["みぎ","ひだり"],["あかるい","くらい"],["つよい","よわい"],["あたらしい","ふるい"],["ひろい","せまい"]];
  const HIRA = "あいうえおかきくけこさしすせそたちつてとなにぬねのはひふへほまみむめもやゆよらりるれろわ".split("");
  const CATS = {
    どうぶつ: [{ t: "いぬ", em: "🐶" }, { t: "ねこ", em: "🐱" }, { t: "ぞう", em: "🐘" }, { t: "きりん", em: "🦒" }, { t: "うま", em: "🐴" }],
    たべもの: [{ t: "りんご", em: "🍎" }, { t: "パン", em: "🍞" }, { t: "ケーキ", em: "🍰" }, { t: "すし", em: "🍣" }, { t: "たまご", em: "🥚" }],
    のりもの: [{ t: "でんしゃ", em: "🚃" }, { t: "くるま", em: "🚗" }, { t: "ふね", em: "⛵" }, { t: "ひこうき", em: "✈️" }, { t: "バス", em: "🚌" }],
    くだもの: [{ t: "ぶどう", em: "🍇" }, { t: "もも", em: "🍑" }, { t: "めろん", em: "🍈" }, { t: "いちご", em: "🍓" }, { t: "みかん", em: "🍊" }],
  };
  function genKokugo() {
    const kind = pick(["mora", "first", "opp", "cat", "cat"]);
    if (kind === "mora") {
      const k = pick(KWORDS), n = k.w.length;
      const nc = numChoices(n, 1, 3);
      return { sub: "こくご ・ もじの かず", cardHTML: `<div class="qmain">${k.e}<br>「${k.w}」は なんもじ？</div>`, choices: nc.choices, correct: nc.correct, cols: 3 };
    }
    if (kind === "first") {
      const k = pick(KWORDS), c = k.w[0];
      const set = new Set([c]); while (set.size < 3) set.add(pick(HIRA));
      const arr = shuffle([...set]);
      return { sub: "こくご ・ はじめの おと", cardHTML: `<div class="qmain">${k.e}<br>「${k.w}」の さいしょの じは？</div>`, choices: arr.map(t => ({ t })), correct: arr.indexOf(c), cols: 3 };
    }
    if (kind === "opp") {
      const p = pick(OPP), flip = Math.random() < 0.5, q = p[flip ? 0 : 1], a = p[flip ? 1 : 0];
      const others = shuffle(OPP.filter(x => x !== p).flat()); const set = new Set([a]); let i = 0; while (set.size < 3) set.add(others[i++]);
      const arr = shuffle([...set]);
      return { sub: "こくご ・ はんたいことば", cardHTML: `<div class="qmain">「${q}」の<br>はんたいは？</div>`, choices: arr.map(t => ({ t })), correct: arr.indexOf(a), cols: arr.some(x=>x.length>3)?1:3 };
    }
    // category
    const cats = Object.keys(CATS), target = pick(cats);
    const correctItem = pick(CATS[target]);
    const wrongCats = shuffle(cats.filter(c => c !== target));
    const opts = [correctItem, pick(CATS[wrongCats[0]]), pick(CATS[wrongCats[1]])];
    shuffle(opts);
    return { sub: "こくご ・ なかま さがし", cardHTML: `<div class="qmain">「${target}」は どれ？</div>`, choices: opts.map(o => ({ t: o.t, em: o.em })), correct: opts.indexOf(correctItem), cols: 3 };
  }

  // ============================================================
  //  AUDIO
  // ============================================================
  let AU = null, soundOn = true;
  function initAudio() { const AC = window.AudioContext || window.webkitAudioContext; if (!AC) return; AU = { acx: new AC() }; AU.master = AU.acx.createGain(); AU.master.gain.value = 0.5; AU.master.connect(AU.acx.destination); if (AU.acx.state === "suspended") AU.acx.resume(); }
  function tone(f, t0, dur, vol, type = "sine", glide) { const { acx, master } = AU, t = acx.currentTime + t0; const o = acx.createOscillator(); o.type = type; o.frequency.setValueAtTime(f, t); if (glide) o.frequency.exponentialRampToValueAtTime(glide, t + dur); const g = acx.createGain(); g.gain.setValueAtTime(0.0001, t); g.gain.exponentialRampToValueAtTime(vol, t + 0.01); g.gain.exponentialRampToValueAtTime(0.0001, t + dur); o.connect(g); g.connect(master); o.start(t); o.stop(t + dur + 0.02); }
  const sfx = {
    tap() { if (AU && soundOn) tone(600, 0, 0.08, 0.12, "sine", 400); },
    correct() { if (AU && soundOn) [523, 659, 784].forEach((f, i) => tone(f, i * 0.09, 0.16, 0.2, "triangle")); },
    wrong() { if (AU && soundOn) tone(300, 0, 0.2, 0.12, "sine", 220); },
    fanfare() { if (AU && soundOn) [523, 659, 784, 1047, 1319].forEach((f, i) => tone(f, i * 0.1, 0.25, 0.22, "triangle")); },
  };

  // ============================================================
  //  CONFETTI
  // ============================================================
  const cf = $("confetti"); const cfx = cf.getContext("2d");
  let cfW = 0, cfH = 0, confetti = [];
  function cfResize() { const dpr = Math.min(devicePixelRatio || 1, 2); const r = cf.getBoundingClientRect(); cfW = r.width; cfH = r.height; cf.width = cfW * dpr; cf.height = cfH * dpr; cfx.setTransform(dpr, 0, 0, dpr, 0, 0); }
  function burst(n = 60) {
    for (let i = 0; i < n; i++) confetti.push({ x: cfW / 2 + rand(-40, 40), y: cfH * 0.4, vx: rand(-220, 220), vy: rand(-360, -120), r: rand(4, 9), rot: rand(0, 6.28), vr: rand(-6, 6), c: pick(["#ff6b8a","#ffd23f","#6ac8ff","#7ee08a","#c084fc","#ffa04b"]), life: 0, max: rand(1.1, 1.8) });
  }
  function stepConfetti(dt) {
    for (const p of confetti) { p.life += dt; p.vy += 520 * dt; p.x += p.vx * dt; p.y += p.vy * dt; p.rot += p.vr * dt; }
    confetti = confetti.filter(p => p.life < p.max && p.y < cfH + 30);
    cfx.clearRect(0, 0, cfW, cfH);
    for (const p of confetti) { cfx.save(); cfx.translate(p.x, p.y); cfx.rotate(p.rot); cfx.globalAlpha = Math.max(0, 1 - p.life / p.max); cfx.fillStyle = p.c; cfx.fillRect(-p.r, -p.r * 0.6, p.r * 2, p.r * 1.2); cfx.restore(); }
  }
  const rand = (a, b) => a + Math.random() * (b - a);

  // ============================================================
  //  STATE & PERSISTENCE
  // ============================================================
  const store = {
    load() { try { return JSON.parse(localStorage.getItem("doubutsu") || "{}"); } catch { return {}; } },
    save() { try { localStorage.setItem("doubutsu", JSON.stringify({ stars, met: [...met], mathLv })); } catch {} },
  };
  const saved = store.load();
  let stars = saved.stars || 0;
  const met = new Set(saved.met || []);
  mathLv = saved.mathLv || 0;

  // ============================================================
  //  SCREENS
  // ============================================================
  function show(name) {
    for (const s of document.querySelectorAll(".screen")) s.classList.toggle("on", s.id === name);
    if (name === "dex") buildDex();
    if (name === "home") refreshHome();
  }
  document.querySelectorAll("[data-act]").forEach(b => b.addEventListener("click", () => {
    const a = b.dataset.act; sfx.tap();
    if (a === "home") show("home");
    else if (a === "dex") show("dex");
    else if (a === "sansuu" || a === "kokugo") startQuiz(a);
  }));
  $("snd").addEventListener("click", () => { soundOn = !soundOn; $("snd").textContent = soundOn ? "🔊" : "🔈"; });

  function refreshHome() {
    $("h-star").textContent = stars; $("h-paw").textContent = met.size;
  }

  // ============================================================
  //  QUIZ
  // ============================================================
  let subject = "sansuu", curQ = null, locked = false, wrongOnThis = 0, toNext = 0;
  const N_TO_ANIMAL = () => (met.size === 0 ? 3 : 4);

  function startQuiz(subj) {
    subject = subj; toNext = 0; wrongOnThis = 0;
    $("q-star").textContent = stars;
    setSessionAnimal();
    show("quiz");
    updateMeter();
    nextQuestion();
  }
  function setSessionAnimal() {
    const pool = [...met];
    const id = pool.length ? pool[ri(pool.length)] : null;
    $("quiz-animal").textContent = id ? ANIMAL_BY_ID[id].em : "🦊";
  }
  function updateMeter() { $("q-fill").style.width = (toNext / N_TO_ANIMAL() * 100) + "%"; }

  function nextQuestion() {
    wrongOnThis = 0; locked = false;
    curQ = subject === "sansuu" ? genSansuu() : genKokugo();
    if (curQ.animal) $("quiz-animal").textContent = curQ.animal;
    $("q-sub").textContent = curQ.sub;
    $("q-content").innerHTML = curQ.cardHTML;
    $("speech").textContent = pick(["こたえは どれかな？", "がんばって！", "どれだと おもう？", "よーく みてね"]);
    const box = $("answers");
    box.className = curQ.cols === 3 ? "three" : curQ.cols === 1 ? "one" : "";
    box.innerHTML = "";
    curQ.choices.forEach((ch, i) => {
      const b = document.createElement("button"); b.className = "ans";
      b.innerHTML = ch.em ? `<span class="em">${ch.em}</span><span style="font-size:15px;font-weight:800;margin-top:2px">${ch.t}</span>` : ch.t;
      if (ch.em) b.style.flexDirection = "column", b.style.display = "flex", b.style.alignItems = "center";
      b.addEventListener("click", () => answer(i, b));
      box.appendChild(b);
    });
  }

  function answer(i, btn) {
    if (locked || btn.classList.contains("wrong")) return;
    if (i === curQ.correct) {
      locked = true; sfx.correct();
      btn.classList.add("correct");
      $("quiz-animal").className = "happy"; $("quiz-animal").classList.add("happy");
      const anim = $("quiz-animal"); anim.classList.remove("sad"); anim.classList.add("happy");
      setTimeout(() => anim.classList.remove("happy"), 650);
      stars++; $("q-star").textContent = stars; $("h-star").textContent = stars;
      if (wrongOnThis === 0) mathLv += (subject === "sansuu" ? 0.25 : 0);
      showFeedback(pick(["せいかい！🎉", "すごい！⭐", "やったね！🌟", "だいせいかい！✨", "てんさい！🎊"]));
      burst(50);
      toNext++; updateMeter(); store.save();
      setTimeout(() => {
        hideFeedback();
        if (toNext >= N_TO_ANIMAL()) { toNext = 0; updateMeter(); meetAnimal(); }
        else nextQuestion();
      }, 1000);
    } else {
      wrongOnThis++; sfx.wrong();
      btn.classList.add("wrong"); btn.disabled = true;
      const anim = $("quiz-animal"); anim.classList.remove("happy"); anim.classList.add("sad");
      setTimeout(() => anim.classList.remove("sad"), 450);
      $("speech").textContent = pick(["おしい！ もういちど！", "ちがうよ、もういっかい！", "だいじょうぶ、もう いちど！"]);
      if (wrongOnThis >= 2) {
        // gently reveal the answer so nobody gets stuck
        const btns = $("answers").querySelectorAll(".ans");
        btns[curQ.correct].classList.add("correct");
        $("speech").textContent = "こたえは これだよ！ タッチしてね";
      }
    }
  }
  function showFeedback(txt) { $("fb-big").textContent = txt; $("feedback").classList.add("on"); }
  function hideFeedback() { $("feedback").classList.remove("on"); }

  // ---- meeting a new animal ----
  function meetAnimal() {
    const unmet = ANIMALS.filter(a => !met.has(a.id));
    if (!unmet.length) { // all met — star bonus instead
      stars += 5; $("q-star").textContent = stars; store.save();
      sfx.fanfare(); burst(90); showFeedback("スターボーナス！⭐⭐"); setTimeout(() => { hideFeedback(); nextQuestion(); }, 1300); return;
    }
    const a = pick(unmet); met.add(a.id); store.save();
    $("rv-em").textContent = a.em; $("rv-nm").textContent = a.nm;
    $("rv-food").textContent = a.food; $("rv-char").textContent = a.char;
    $("reveal").classList.add("on"); sfx.fanfare(); burst(110);
    refreshHome();
  }
  $("rv-ok").addEventListener("click", () => { sfx.tap(); $("reveal").classList.remove("on"); setSessionAnimal(); nextQuestion(); });

  // ============================================================
  //  DEX
  // ============================================================
  function buildDex() {
    $("d-paw").textContent = met.size; $("d-total").textContent = ANIMALS.length;
    const grid = $("dex-grid"); grid.innerHTML = "";
    for (const a of ANIMALS) {
      const has = met.has(a.id);
      const cell = document.createElement("div"); cell.className = "acell" + (has ? "" : " locked");
      cell.innerHTML = `<div class="em">${has ? a.em : "❔"}</div><div class="nm">${has ? a.nm : "？？？"}</div>`;
      if (has) cell.addEventListener("click", () => openDetail(a));
      grid.appendChild(cell);
    }
  }
  function openDetail(a) {
    sfx.tap();
    $("dt-em").textContent = a.em; $("dt-nm").textContent = a.nm;
    $("dt-food").textContent = a.food; $("dt-char").textContent = a.char; $("dt-extra").textContent = a.extra;
    $("detail").classList.add("on");
  }
  $("dt-close").addEventListener("click", () => { sfx.tap(); $("detail").classList.remove("on"); });
  $("detail").addEventListener("click", e => { if (e.target.id === "detail") $("detail").classList.remove("on"); });

  // ============================================================
  //  MAIN LOOP (confetti) + boot
  // ============================================================
  let lastT = performance.now();
  function loop(now) { requestAnimationFrame(loop); const dt = Math.min((now - lastT) / 1000, 0.05); lastT = now; if (confetti.length) stepConfetti(dt); }
  window.addEventListener("resize", cfResize);
  // first tap anywhere starts audio (autoplay policies)
  function armAudio() { if (!AU) initAudio(); window.removeEventListener("pointerdown", armAudio); }
  window.addEventListener("pointerdown", armAudio);

  cfResize();
  refreshHome();
  requestAnimationFrame(loop);

  // test hook
  window.__doubutsu = {
    startQuiz, show, get stars() { return stars; }, get met() { return [...met]; },
    genSansuu, genKokugo,
    answerCorrect() { if (curQ) answer(curQ.correct, $("answers").children[curQ.correct]); },
    reset() { stars = 0; met.clear(); mathLv = 0; store.save(); refreshHome(); },
  };
})();
</script>
</body>
</html>
