<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>色即是空 ― Form is Emptiness</title>
<style>
  :root {
    --ink: #f2ece0;
    --gold: #e3c076;
    --dim: #7c8494;
    --line: rgba(227, 192, 118, 0.22);
    --panel: rgba(10, 11, 18, 0.55);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #05060a;
    color: var(--ink);
    font-family: "Hiragino Kaku Gothic ProN", "Noto Sans JP", "Yu Gothic", system-ui, sans-serif;
    -webkit-user-select: none; user-select: none;
    touch-action: none;
  }
  #void { position: fixed; inset: 0; display: block; }

  /* ---------- HUD ---------- */
  #hud { position: fixed; inset: 0; pointer-events: none; z-index: 10; transition: opacity 1s; }
  #hud.hidden-all { opacity: 0 !important; }
  /* idle-dim fades only the peripheral chrome, never the caption */
  #brand, #meter, #sutra, #controls, #hint { transition: opacity 1.2s ease; }
  #hud.dim #brand, #hud.dim #meter, #hud.dim #sutra,
  #hud.dim #controls, #hud.dim #hint { opacity: 0.12; }

  /* form caption (lower third) */
  #caption {
    position: absolute; left: 50%; bottom: 16%;
    transform: translateX(-50%);
    text-align: center;
    width: min(92vw, 720px);
    opacity: 0; transition: opacity 1.6s ease;
  }
  #caption.show { opacity: 1; }
  #cap-yomi {
    font-family: "Hiragino Mincho ProN", "Yu Mincho", "Noto Serif JP", serif;
    font-size: clamp(15px, 2.4vw, 21px);
    letter-spacing: 0.42em; text-indent: 0.42em;
    color: var(--gold);
  }
  #cap-mean {
    margin-top: 12px;
    font-family: "Hiragino Mincho ProN", "Yu Mincho", "Noto Serif JP", serif;
    font-size: clamp(12.5px, 1.7vw, 15px);
    letter-spacing: 0.18em; line-height: 2;
    color: var(--ink); opacity: 0.82;
  }

  /* corner titles */
  #brand {
    position: absolute; top: 22px; left: 26px;
  }
  #brand .jp {
    font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
    font-size: 15px; letter-spacing: 0.5em; text-indent: 0.5em; color: var(--gold);
  }
  #brand .en { margin-top: 5px; font-size: 10px; letter-spacing: 0.34em; color: var(--dim); }

  /* right-side vertical heart-sutra ribbon */
  #sutra {
    position: absolute; top: 0; right: 20px; height: 100%;
    display: flex; align-items: center;
    writing-mode: vertical-rl;
    font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
    font-size: 11px; letter-spacing: 0.22em;
    color: rgba(242, 236, 224, 0.14);
    white-space: nowrap;
  }

  /* arising counter */
  #meter {
    position: absolute; top: 24px; right: 54px;
    text-align: right;
  }
  #meter .n { font-size: 20px; font-variant-numeric: tabular-nums; color: var(--gold); font-weight: 300; letter-spacing: 0.04em; }
  #meter .l { font-size: 9.5px; letter-spacing: 0.3em; color: var(--dim); margin-top: 2px; }

  /* controls (bottom center) */
  #controls {
    position: absolute; bottom: 26px; left: 50%;
    transform: translateX(-50%);
    display: flex; align-items: center; gap: 8px;
    pointer-events: auto;
  }
  .ctl {
    font-family: inherit; font-size: 12px; letter-spacing: 0.1em;
    color: var(--ink);
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 9px 18px;
    cursor: pointer;
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    transition: border-color .2s, color .2s, background .2s;
  }
  .ctl:hover { border-color: var(--gold); color: #fff6e2; }
  .ctl.icon { padding: 9px 13px; }

  #hint {
    position: absolute; bottom: 68px; left: 50%;
    transform: translateX(-50%);
    font-size: 11px; letter-spacing: 0.14em; color: var(--dim);
    opacity: 0.8; transition: opacity 1s;
    text-align: center; width: min(92vw, 560px);
  }
  #hint.gone { opacity: 0; }

  /* ---------- title screen ---------- */
  #enter {
    position: fixed; inset: 0; z-index: 40;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: radial-gradient(ellipse at 50% 42%, rgba(24, 22, 34, 0.4), rgba(3, 4, 8, 0.82));
    transition: opacity 1.8s ease;
    padding: 24px;
  }
  #enter.gone { opacity: 0; pointer-events: none; }
  #enter .glyph {
    font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
    font-size: clamp(64px, 15vw, 150px);
    letter-spacing: 0.14em; text-indent: 0.14em;
    background: linear-gradient(180deg, #fbf4e4 0%, var(--gold) 60%, #7a5a24 100%);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 40px rgba(227, 192, 118, 0.3));
    line-height: 1.05;
  }
  #enter .en {
    margin-top: 18px; font-size: 12.5px; letter-spacing: 0.5em; text-indent: 0.5em; color: var(--dim);
  }
  #enter .desc {
    margin-top: 34px; max-width: 560px; text-align: center;
    font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
    font-size: 13.5px; line-height: 2.3; letter-spacing: 0.12em; color: rgba(242,236,224,0.8);
  }
  #enter-btn {
    margin-top: 40px;
    font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
    font-size: 15px; letter-spacing: 0.5em; text-indent: 0.5em;
    color: #0a0a0e; font-weight: 700;
    background: linear-gradient(90deg, var(--gold), #f0dca0);
    border: none; border-radius: 999px;
    padding: 15px 46px; cursor: pointer;
    box-shadow: 0 0 34px rgba(227, 192, 118, 0.32);
    transition: transform .3s, box-shadow .3s;
  }
  #enter-btn:hover { transform: translateY(-2px); box-shadow: 0 0 50px rgba(227, 192, 118, 0.5); }
  #enter .note { margin-top: 20px; font-size: 10.5px; letter-spacing: 0.18em; color: var(--dim); }

  @media (max-width: 720px) {
    #sutra { display: none; }
    #brand { top: 16px; left: 16px; }
    #meter { top: 16px; right: 18px; }
    #caption { bottom: 20%; }
    #controls { bottom: calc(18px + env(safe-area-inset-bottom, 0px)); }
    .ctl { padding: 8px 14px; font-size: 11px; }
  }
</style>
</head>
<body>
<canvas id="void"></canvas>

<div id="hud">
  <div id="brand">
    <div class="jp">色即是空</div>
    <div class="en">FORM ⇌ EMPTINESS</div>
  </div>
  <div id="sutra">観自在菩薩　行深般若波羅蜜多時　照見五蘊皆空　度一切苦厄　色不異空　空不異色　色即是空　空即是色</div>
  <div id="meter">
    <div class="n" id="meter-n">0</div>
    <div class="l">生滅 · ARISINGS</div>
  </div>

  <div id="caption">
    <div id="cap-yomi"></div>
    <div id="cap-mean"></div>
  </div>

  <div id="hint">形に触れれば、乱れ、また現れる ― 掴もうとしても、留まらない</div>
  <div id="controls">
    <button class="ctl" id="btn-release">手放す</button>
    <button class="ctl icon" id="btn-pause" title="停止／再開">⏸</button>
    <button class="ctl icon" id="btn-sound" title="音">🔔</button>
  </div>
</div>

<div id="enter">
  <div class="glyph">色即是空</div>
  <div class="en">SHIKI SOKU ZE KŪ</div>
  <div class="desc">
    形あるものは、実体をもたない。<br>
    けれど、その空しさから、また形は生まれる。<br>
    ― 集まっては散る光の中に、その理を見る。
  </div>
  <button id="enter-btn">はじめる</button>
  <div class="note">音を出して、ゆっくりご覧ください</div>
</div>
<script>
"use strict";
(() => {
  // ============================================================
  //  色即是空 — particles endlessly become form, then emptiness
  // ============================================================
  const canvas = document.getElementById("void");
  const ctx = canvas.getContext("2d");
  let W = 0, H = 0, DPR = 1;

  const TAU = Math.PI * 2;
  const clamp = (v, a, b) => v < a ? a : v > b ? b : v;
  const lerp = (a, b, t) => a + (b - a) * t;
  const easeInOut = t => t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
  const rand = (a, b) => a + Math.random() * (b - a);
  const $ = id => document.getElementById(id);

  // ---------------- particle storage (SoA) ----------------
  let N = 3600;
  const MAX = 5200;
  const px = new Float32Array(MAX), py = new Float32Array(MAX);
  const vx = new Float32Array(MAX), vy = new Float32Array(MAX);
  const tx = new Float32Array(MAX), ty = new Float32Array(MAX);  // target
  const has = new Uint8Array(MAX);                                // has a target?
  const col = new Uint8Array(MAX);                                // color index into current palette
  const sz  = new Float32Array(MAX);                              // base size
  const ph  = new Float32Array(MAX);                              // per-particle phase
  const seed = new Float32Array(MAX);

  const state = {
    started: false,
    paused: false,
    phase: "void",     // gather | hold | dissolve | void
    phaseT: 0,
    formIdx: -1,
    arisings: 0,
    breath: 0,
    dim: 0,            // idle-dim timer
  };

  // phase durations (seconds)
  const DUR = { gather: 3.0, hold: 5.2, dissolve: 2.8, void: 2.6 };

  // ---------------- cheap flow field (curl-ish) ----------------
  function flow(x, y, t) {
    const s = 0.0016;
    const a = Math.sin(x * s + t * 0.20) + Math.cos(y * s * 1.3 - t * 0.16)
            + Math.sin((x + y) * s * 0.7 + t * 0.11);
    return a * 1.7; // angle
  }

  // ---------------- pointer ----------------
  const ptr = { x: -1e4, y: -1e4, px: -1e4, py: -1e4, down: false, in: false, vx: 0, vy: 0 };

  // ============================================================
  //  AUDIO — singing bowl, drone, shimmer (all synthesized)
  // ============================================================
  let AU = null, soundOn = true;
  function initAudio() {
    const AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) return;
    const acx = new AC();
    const master = acx.createGain(); master.gain.value = 0;
    const comp = acx.createDynamicsCompressor();
    master.connect(comp); comp.connect(acx.destination);

    // low drone: two detuned sines
    const droneG = acx.createGain(); droneG.gain.value = 0.06; droneG.connect(master);
    for (const f of [63.0, 94.5]) {
      const o = acx.createOscillator(); o.type = "sine"; o.frequency.value = f;
      const g = acx.createGain(); g.gain.value = 0.5;
      const lfo = acx.createOscillator(); lfo.frequency.value = 0.05 + Math.random() * 0.06;
      const lg = acx.createGain(); lg.gain.value = 0.25;
      lfo.connect(lg); lg.connect(g.gain);
      o.connect(g); g.connect(droneG); o.start(); lfo.start();
    }
    // shimmer noise (the sound of the void)
    const len = acx.sampleRate * 2;
    const buf = acx.createBuffer(1, len, acx.sampleRate);
    const ch = buf.getChannelData(0);
    for (let i = 0; i < len; i++) ch[i] = Math.random() * 2 - 1;
    const noise = acx.createBufferSource(); noise.buffer = buf; noise.loop = true;
    const nf = acx.createBiquadFilter(); nf.type = "bandpass"; nf.frequency.value = 1600; nf.Q.value = 0.6;
    const ng = acx.createGain(); ng.gain.value = 0.0;
    noise.connect(nf); nf.connect(ng); ng.connect(master); noise.start();

    AU = { acx, master, ng };
    setSound(soundOn);
  }
  function setSound(on) {
    soundOn = on;
    $("btn-sound").textContent = on ? "🔔" : "🔕";
    if (!AU) return;
    if (AU.acx.state === "suspended") AU.acx.resume();
    AU.master.gain.setTargetAtTime(on ? 0.85 : 0, AU.acx.currentTime, 0.6);
  }
  // inharmonic bell / singing-bowl strike
  function strikeBowl(base = 196, vol = 0.5) {
    if (!AU || !soundOn) return;
    const { acx, master } = AU;
    const t = acx.currentTime;
    const partials = [
      [1.0, 1.0, 5.5], [2.02, 0.5, 4.2], [2.76, 0.34, 3.6],
      [4.9, 0.18, 2.6], [7.1, 0.10, 1.9],
    ];
    for (const [r, a, dec] of partials) {
      const o = acx.createOscillator(); o.type = "sine";
      o.frequency.value = base * r;
      o.frequency.setValueAtTime(base * r * 1.002, t);
      o.frequency.exponentialRampToValueAtTime(base * r, t + 0.4);
      const g = acx.createGain();
      g.gain.setValueAtTime(0.0001, t);
      g.gain.exponentialRampToValueAtTime(vol * a, t + 0.012);
      g.gain.exponentialRampToValueAtTime(0.0001, t + dec);
      o.connect(g); g.connect(master);
      o.start(t); o.stop(t + dec + 0.1);
    }
  }
  function softChime(base = 523) {
    if (!AU || !soundOn) return;
    const { acx, master } = AU, t = acx.currentTime;
    const o = acx.createOscillator(); o.type = "sine"; o.frequency.value = base;
    const g = acx.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.12, t + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 1.4);
    o.connect(g); g.connect(master); o.start(t); o.stop(t + 1.5);
  }
  // pentatonic-ish bases for successive forms
  const BOWL_NOTES = [196.0, 220.0, 261.6, 293.7, 329.6, 392.0, 440.0];

  // ============================================================
  //  FORMS — each is a cloud of target points sampled from a shape
  // ============================================================
  // A form definition: { draw(octx,w,h), palette:[[r,g,b],...], scale, yomi, mean, wide }
  // Points are sampled from opaque pixels of the drawn shape.

  const PAL = {
    ink:  [[244, 238, 226]],
    gold: [[232, 202, 130], [214, 176, 96]],
    rose: [[233, 170, 193], [214, 130, 160], [245, 214, 224]],
    lotus:[[236, 174, 196], [250, 224, 232], [226, 200, 120]],
    jade: [[150, 214, 186], [206, 236, 214]],
  };

  function glyphForm(text, palette, scale, yomi, mean, opt = {}) {
    return {
      palette, scale, yomi, mean, wide: opt.wide || false,
      draw(o, w, h) {
        o.fillStyle = "#fff";
        o.textAlign = "center"; o.textBaseline = "middle";
        const lines = text.split("\n");
        const fs = (opt.wide ? h * 0.42 : h * 0.72) / (lines.length > 1 ? 1.15 : 1);
        o.font = `900 ${fs}px "Hiragino Mincho ProN","Yu Mincho","Noto Serif JP",serif`;
        const lh = fs * 1.12;
        const y0 = h / 2 - (lines.length - 1) * lh / 2;
        for (let i = 0; i < lines.length; i++) o.fillText(lines[i], w / 2, y0 + i * lh);
      },
    };
  }

  // ensō — a single brush circle with a gap and living thickness
  const ensoForm = {
    palette: PAL.ink, scale: 0.82, yomi: "えんそう ― 円相",
    mean: "欠けたまま、満ちている。ひと筆で描く、宇宙。",
    draw(o, w, h) {
      const cx = w / 2, cy = h / 2, R = Math.min(w, h) * 0.36;
      o.strokeStyle = "#fff"; o.lineCap = "round";
      const gap = 0.5; // radians of opening
      const start = -Math.PI * 0.15;
      const steps = 220;
      for (let i = 0; i < steps; i++) {
        const t = i / steps;
        const a = start + t * (TAU - gap);
        const wob = 1 + Math.sin(a * 3 + 1) * 0.03 + Math.sin(a * 7) * 0.02;
        const r = R * wob;
        const lw = (14 - t * 8) * (0.7 + 0.5 * Math.sin(t * Math.PI)); // brush thins toward the end
        o.lineWidth = Math.max(lw, 2);
        o.beginPath();
        o.arc(cx, cy, r, a, a + (TAU - gap) / steps + 0.02);
        o.stroke();
      }
    },
  };

  // lotus — layered petals opening from a golden heart
  const lotusForm = {
    palette: PAL.lotus, scale: 0.9, yomi: "はす ― 蓮",
    mean: "泥の中から、汚れずに、花はひらく。",
    draw(o, w, h) {
      const cx = w / 2, cy = h * 0.56, R = Math.min(w, h) * 0.34;
      const petal = (ang, len, wid, color) => {
        o.save(); o.translate(cx, cy); o.rotate(ang);
        o.fillStyle = color;
        o.beginPath();
        o.moveTo(0, 0);
        o.quadraticCurveTo(wid, -len * 0.5, 0, -len);
        o.quadraticCurveTo(-wid, -len * 0.5, 0, 0);
        o.fill(); o.restore();
      };
      // back row
      for (let i = 0; i < 8; i++) petal(i / 8 * TAU + Math.PI / 8, R * 1.02, R * 0.34, "#dd9",);
      for (let i = 0; i < 8; i++) petal(i / 8 * TAU + Math.PI / 8, R, R * 0.34, "rgba(236,174,196,1)");
      // front row
      for (let i = 0; i < 8; i++) petal(i / 8 * TAU, R * 0.78, R * 0.30, "#fff");
      // heart
      o.fillStyle = "#eecb78";
      o.beginPath(); o.arc(cx, cy, R * 0.16, 0, TAU); o.fill();
    },
  };

  // cherry blossom — five notched petals (impermanence)
  const sakuraForm = {
    palette: PAL.rose, scale: 0.72, yomi: "さくら ― 桜",
    mean: "咲くそばから、散ってゆく。だから、美しい。",
    petals: true,
    draw(o, w, h) {
      const cx = w / 2, cy = h / 2, R = Math.min(w, h) * 0.42;
      o.translate(cx, cy);
      for (let i = 0; i < 5; i++) {
        o.save(); o.rotate(i / 5 * TAU);
        o.fillStyle = i % 2 ? "#f7d3df" : "#efb3c8";
        o.beginPath();
        o.moveTo(0, 0);
        o.bezierCurveTo(R * 0.34, -R * 0.5, R * 0.28, -R, 0, -R * 0.92);
        o.bezierCurveTo(-R * 0.28, -R, -R * 0.34, -R * 0.5, 0, 0);
        o.fill();
        // notch
        o.fillStyle = "#05060a";
        o.beginPath(); o.moveTo(0, -R * 0.92);
        o.lineTo(R * 0.06, -R * 0.78); o.lineTo(-R * 0.06, -R * 0.78);
        o.fill();
        o.restore();
      }
      o.fillStyle = "#e7c06a";
      o.beginPath(); o.arc(0, 0, R * 0.12, 0, TAU); o.fill();
    },
  };

  // the sequence of forms (a small life, each)
  const FORMS = [
    glyphForm("色", PAL.ink, 0.72, "しき ― 色", "形あるもの、目に映るすべて。"),
    glyphForm("空", PAL.gold, 0.72, "くう ― 空", "確かなものは、何ひとつない。"),
    ensoForm,
    lotusForm,
    sakuraForm,
    glyphForm("心", PAL.gold, 0.72, "しん ― 心", "般若心経。とらわれのない、こころ。"),
    glyphForm("無", PAL.ink, 0.72, "む ― 無", "何もない。ゆえに、何もかもがある。"),
    glyphForm("色即是空\n空即是色", PAL.gold, 1.0, "しきそくぜくう・くうそくぜしき",
      "形は空に、空は形に。移ろい、また現れる。", { wide: true }),
  ];

  // ---------------- sampling ----------------
  const sampler = document.createElement("canvas");
  const sctx = sampler.getContext("2d", { willReadFrequently: true });

  function samplePoints(form) {
    const wide = form.wide;
    const SW = wide ? 640 : 360, SH = 360;
    sampler.width = SW; sampler.height = SH;
    sctx.setTransform(1, 0, 0, 1, 0, 0);
    sctx.clearRect(0, 0, SW, SH);
    sctx.save();
    form.draw(sctx, SW, SH);
    sctx.restore();
    const img = sctx.getImageData(0, 0, SW, SH).data;

    const pts = [];
    const stride = 3;
    for (let y = 0; y < SH; y += stride) {
      for (let x = 0; x < SW; x += stride) {
        const a = img[(y * SW + x) * 4 + 3];
        if (a > 80) {
          const r = img[(y * SW + x) * 4], g = img[(y * SW + x) * 4 + 1], b = img[(y * SW + x) * 4 + 2];
          pts.push({ x, y, bright: (r + g + b) / 3 });
        }
      }
    }
    // normalize around canvas center, unit = half of max dimension
    const half = SH / 2;
    const list = [];
    for (const p of pts) list.push({ nx: (p.x - SW / 2) / half, ny: (p.y - SH / 2) / half });
    // shuffle so any subset of points still covers the whole shape
    for (let i = list.length - 1; i > 0; i--) { const j = (Math.random() * (i + 1)) | 0; [list[i], list[j]] = [list[j], list[i]]; }
    return list;
  }

  // ============================================================
  //  STATE MACHINE — gather → hold → dissolve → void → (next)
  // ============================================================
  let formStrength = 0;     // 0 = pure void, 1 = fully formed
  let curSprites = [];      // glow sprites for the current palette
  let cx0 = 0, cy0 = 0, formScale = 1;
  const sampleCache = new Map();

  function fitForm(idx) {
    const form = FORMS[idx];
    let list = sampleCache.get(form);
    if (!list) { list = samplePoints(form); sampleCache.set(form, list); }
    cx0 = W / 2; cy0 = H / 2;
    formScale = form.scale * Math.min(W, H) * 0.44;

    // shuffle particle order so a different subset forms each shape
    const order = [];
    for (let i = 0; i < N; i++) order.push(i);
    for (let i = N - 1; i > 0; i--) { const j = (Math.random() * (i + 1)) | 0; [order[i], order[j]] = [order[j], order[i]]; }

    const L = list.length;
    const nPal = curSprites.length;
    // every particle joins the form; if there are more particles than sampled
    // points, extra ones densify the shape (a thin brush becomes lush) with a
    // little jitter — this also prevents any "ghost" of the previous form.
    for (let k = 0; k < N; k++) {
      const i = order[k];
      let pt, jit = 0;
      if (k < L) { pt = list[k]; }
      else { pt = list[(Math.random() * L) | 0]; jit = formScale * 0.012; }
      tx[i] = cx0 + pt.nx * formScale + (jit ? rand(-jit, jit) : 0);
      ty[i] = cy0 + pt.ny * formScale + (jit ? rand(-jit, jit) : 0);
      has[i] = 1;
      col[i] = (Math.random() * nPal) | 0;
    }
  }

  function enterForm(idx) {
    state.formIdx = idx;
    const form = FORMS[idx];
    curSprites = form.__sprites || (form.__sprites = form.palette.map(c => makeGlow(c)));
    fitForm(idx);
    setPhase("gather");
    strikeBowl(BOWL_NOTES[idx % BOWL_NOTES.length], 0.5);
    // caption
    $("cap-yomi").textContent = form.yomi;
    $("cap-mean").textContent = form.mean;
  }

  function setPhase(p) { state.phase = p; state.phaseT = 0; }

  function advancePhase() {
    switch (state.phase) {
      case "gather": setPhase("hold"); $("caption").classList.add("show"); break;
      case "hold":
        setPhase("dissolve");
        $("caption").classList.remove("show");
        // a gentle outward breath — letting go
        for (let i = 0; i < N; i++) {
          if (!has[i]) continue;
          const dx = px[i] - cx0, dy = py[i] - cy0;
          const d = Math.hypot(dx, dy) || 1;
          vx[i] += dx / d * rand(8, 26);
          vy[i] += dy / d * rand(8, 26);
        }
        break;
      case "dissolve": setPhase("void"); break;
      case "void":
        state.arisings++;
        $("meter-n").textContent = state.arisings;
        enterForm((state.formIdx + 1) % FORMS.length);
        break;
    }
  }

  function stepState(dt) {
    state.phaseT += dt;
    const d = DUR[state.phase];
    // formStrength envelope
    if (state.phase === "gather") formStrength = easeInOut(clamp(state.phaseT / d, 0, 1));
    else if (state.phase === "hold") formStrength = 1;
    else if (state.phase === "dissolve") formStrength = 1 - easeInOut(clamp(state.phaseT / d, 0, 1));
    else formStrength = 0;
    if (state.phaseT >= d) advancePhase();
  }

  function releaseNow() {
    // "手放す" — force an early dissolve from any phase
    if (state.phase === "gather" || state.phase === "hold") {
      state.phaseT = DUR[state.phase];
      advancePhase();
    }
  }

  // ============================================================
  //  UPDATE (physics only; stepState is driven by the main loop)
  // ============================================================
  function _physics(dt) {
    state.breath = (state.breath + dt / 9) % 1;                 // ~9s breath
    const breath = 0.5 - 0.5 * Math.cos(state.breath * TAU);    // 0..1

    // pointer velocity (a hand passing through)
    ptr.vx = ptr.x - ptr.px; ptr.vy = ptr.y - ptr.py;
    ptr.px = ptr.x; ptr.py = ptr.y;
    const pR = ptr.down ? 168 : 122;
    const pR2 = pR * pR;
    const pStrength = ptr.down ? 2000 : 1050;

    const t = state.time;
    const fs = formStrength;
    // during hold the form quietly breathes (nothing is ever truly still)
    const pulse = 1 + (state.phase === "hold" ? (breath - 0.5) * 0.03 : 0);

    for (let i = 0; i < N; i++) {
      let ax = 0, ay = 0;

      if (fs > 0.001 && has[i]) {
        const gx = cx0 + (tx[i] - cx0) * pulse;
        const gy = cy0 + (ty[i] - cy0) * pulse;
        const k = 26 * fs;
        ax += (gx - px[i]) * k;
        ay += (gy - py[i]) * k;
      }
      // void drift on the flow field (emptiness is not still)
      if (fs < 0.999) {
        const ang = flow(px[i], py[i], t) + seed[i] * TAU;
        const drift = (1 - fs) * 26;
        ax += Math.cos(ang) * drift;
        ay += Math.sin(ang) * drift;
        // slow gravitation to center keeps the void gathered on screen
        ax += (cx0 - px[i]) * 0.25 * (1 - fs);
        ay += (cy0 - py[i]) * 0.25 * (1 - fs);
      }

      // pointer disturbance — touching form scatters it (it will re-form)
      if (ptr.in) {
        const dx = px[i] - ptr.x, dy = py[i] - ptr.y;
        const d2 = dx * dx + dy * dy;
        if (d2 < pR2 && d2 > 0.01) {
          const d = Math.sqrt(d2);
          const f = (1 - d / pR) * pStrength;
          ax += dx / d * f;
          ay += dy / d * f;
          // impart a little of the hand's motion
          ax += ptr.vx * 6 * (1 - d / pR);
          ay += ptr.vy * 6 * (1 - d / pR);
        }
      }

      vx[i] += ax * dt;
      vy[i] += ay * dt;
      // damping: firmer when formed (so shapes are crisp), looser in void
      const damp = Math.pow(fs > 0.5 ? 0.0009 : 0.02, dt);
      vx[i] *= damp; vy[i] *= damp;
      px[i] += vx[i] * dt;
      py[i] += vy[i] * dt;

      // wrap the void softly at the edges
      const m = 30;
      if (px[i] < -m) px[i] = W + m; else if (px[i] > W + m) px[i] = -m;
      if (py[i] < -m) py[i] = H + m; else if (py[i] > H + m) py[i] = -m;
    }
  }

  // ============================================================
  //  RENDERING
  // ============================================================
  function makeGlow(rgb) {
    const s = 32, c = document.createElement("canvas");
    c.width = c.height = s;
    const g = c.getContext("2d");
    const grad = g.createRadialGradient(s / 2, s / 2, 0, s / 2, s / 2, s / 2);
    const [r, gg, b] = rgb;
    grad.addColorStop(0, `rgba(${r},${gg},${b},0.95)`);
    grad.addColorStop(0.35, `rgba(${r},${gg},${b},0.42)`);
    grad.addColorStop(1, `rgba(${r},${gg},${b},0)`);
    g.fillStyle = grad; g.fillRect(0, 0, s, s);
    return c;
  }
  const ashGlow = makeGlow([150, 156, 170]);

  let grainCv = null;
  function makeGrain() {
    grainCv = document.createElement("canvas");
    grainCv.width = 180; grainCv.height = 180;
    const g = grainCv.getContext("2d");
    const img = g.createImageData(180, 180);
    for (let i = 0; i < img.data.length; i += 4) {
      const v = 128 + (Math.random() - 0.5) * 40;
      img.data[i] = img.data[i + 1] = img.data[i + 2] = v;
      img.data[i + 3] = 9;
    }
    g.putImageData(img, 0, 0);
  }

  function drawBackground() {
    const g = ctx.createRadialGradient(W / 2, H * 0.46, 0, W / 2, H * 0.46, Math.max(W, H) * 0.75);
    g.addColorStop(0, "#0d0e18");
    g.addColorStop(0.55, "#07080f");
    g.addColorStop(1, "#040509");
    ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);

    // breathing ensō watermark behind everything
    const breath = 0.5 - 0.5 * Math.cos(state.breath * TAU);
    const R = Math.min(W, H) * (0.30 + breath * 0.012);
    ctx.save();
    ctx.strokeStyle = `rgba(227,192,118,${0.05 + breath * 0.03})`;
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.arc(W / 2, H * 0.46, R, -Math.PI * 0.15, Math.PI * 1.72);
    ctx.stroke();
    ctx.restore();
  }

  function drawParticles() {
    // faint streaks for moving particles (embers scattering / lines converging)
    ctx.globalCompositeOperation = "lighter";
    ctx.lineWidth = 1;
    ctx.strokeStyle = "rgba(227,206,150,0.05)";
    ctx.beginPath();
    for (let i = 0; i < N; i += 1) {
      const sp = vx[i] * vx[i] + vy[i] * vy[i];
      if (sp > 900) {
        ctx.moveTo(px[i], py[i]);
        ctx.lineTo(px[i] - vx[i] * 0.03, py[i] - vy[i] * 0.03);
      }
    }
    ctx.stroke();

    // glow dots
    const nS = curSprites.length;
    for (let i = 0; i < N; i++) {
      const formed = has[i] && formStrength > 0.3;
      const sprite = (formed && nS) ? curSprites[col[i] % nS] : (formStrength > 0.3 && nS ? curSprites[0] : ashGlow);
      const base = sz[i];
      const tw = 0.85 + 0.15 * Math.sin(state.time * 2.4 + ph[i]);
      const r = base * (formed ? 2.3 : 3.1) * tw;
      ctx.drawImage(sprite, px[i] - r, py[i] - r, r * 2, r * 2);
    }
    ctx.globalCompositeOperation = "source-over";
  }

  function drawVignette() {
    const g = ctx.createRadialGradient(W / 2, H / 2, Math.min(W, H) * 0.42, W / 2, H / 2, Math.max(W, H) * 0.72);
    g.addColorStop(0, "rgba(0,0,0,0)");
    g.addColorStop(1, "rgba(2,3,7,0.62)");
    ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
    if (grainCv) {
      const pat = ctx.createPattern(grainCv, "repeat");
      ctx.fillStyle = pat; ctx.fillRect(0, 0, W, H);
    }
  }

  // ============================================================
  //  MAIN LOOP
  // ============================================================
  let lastT = performance.now();
  let idleTimer = 0;

  function loop(now) {
    requestAnimationFrame(loop);
    const dt = Math.min((now - lastT) / 1000, 0.05);
    lastT = now;
    state.time = (state.time || 0) + dt;

    const run = state.started && !state.paused;
    if (run) stepState(dt);
    updatePhysics(dt);

    // ambient audio: void shimmer swells as form dissolves
    if (AU && soundOn) {
      const voidness = 1 - formStrength;
      AU.ng.gain.setTargetAtTime(0.006 + voidness * 0.02, AU.acx.currentTime, 0.5);
    }

    // idle-dims the UI so the piece can breathe
    idleTimer += dt;
    if (idleTimer > 6) $("hud").classList.add("dim");

    drawBackground();
    drawParticles();
    drawVignette();
  }

  // split physics out so it also runs (as pure void) before the piece starts
  function updatePhysics(dt) {
    // reuse the body of update() but without stepState
    _physics(dt);
  }

  // ============================================================
  //  INPUT
  // ============================================================
  function wake() { idleTimer = 0; $("hud").classList.remove("dim"); }

  canvas.addEventListener("pointerdown", e => {
    ptr.down = true; ptr.in = true;
    ptr.x = ptr.px = e.clientX; ptr.y = ptr.py = e.clientY;
    wake(); $("hint").classList.add("gone");
    try { canvas.setPointerCapture(e.pointerId); } catch (_) {}
  });
  canvas.addEventListener("pointermove", e => {
    ptr.x = e.clientX; ptr.y = e.clientY; ptr.in = true; wake();
  });
  canvas.addEventListener("pointerup", () => { ptr.down = false; });
  canvas.addEventListener("pointerleave", () => { ptr.in = false; ptr.down = false; });

  window.addEventListener("keydown", e => {
    if (e.code === "Space") { e.preventDefault(); togglePause(); }
    else if (e.code === "KeyH") $("hud").classList.toggle("hidden-all");
    else if (e.code === "Enter" && !state.started) startPiece();
    wake();
  });

  function togglePause() {
    state.paused = !state.paused;
    $("btn-pause").textContent = state.paused ? "▶" : "⏸";
  }
  $("btn-pause").addEventListener("click", togglePause);
  $("btn-sound").addEventListener("click", () => setSound(!soundOn));
  $("btn-release").addEventListener("click", () => { releaseNow(); wake(); });

  // ============================================================
  //  BOOT
  // ============================================================
  function seedParticles() {
    for (let i = 0; i < MAX; i++) {
      px[i] = rand(0, W); py[i] = rand(0, H);
      vx[i] = rand(-4, 4); vy[i] = rand(-4, 4);
      sz[i] = rand(0.55, 1.5);
      ph[i] = rand(0, TAU);
      seed[i] = Math.random();
      has[i] = 0;
    }
  }

  function resize() {
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth; H = window.innerHeight;
    canvas.width = Math.round(W * DPR); canvas.height = Math.round(H * DPR);
    canvas.style.width = W + "px"; canvas.style.height = H + "px";
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    // particle count scales with area (kept modest on phones)
    N = clamp(Math.round(W * H / 320), 1400, MAX);
    sampleCache.clear();
    if (state.started && state.formIdx >= 0) fitForm(state.formIdx);
  }

  function startPiece() {
    if (state.started) return;
    state.started = true;
    initAudio();
    $("enter").classList.add("gone");
    enterForm(0);
    setTimeout(() => $("hint").classList.remove("gone"), 1200);
  }
  $("enter-btn").addEventListener("click", startPiece);

  window.addEventListener("resize", resize);
  state.time = 0;
  resize();
  makeGrain();
  seedParticles();
  requestAnimationFrame(loop);

  // debug / test hook
  window.__ku = {
    state,
    get N() { return N; },
    get phase() { return state.phase; },
    get strength() { return formStrength; },
    start: startPiece,
    setForm(i) { if (!state.started) startPiece(); enterForm(((i % FORMS.length) + FORMS.length) % FORMS.length); },
    setPhase(p, atEnd) { setPhase(p); if (atEnd) state.phaseT = DUR[p] - 0.001; },
    release: releaseNow,
    forms: FORMS.length,
    ptr,
  };
})();
</script>
</body>
</html>
